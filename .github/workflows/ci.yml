name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@10.30.3 --activate

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate --schema=database/prisma/schema.prisma

      - name: Type check shared
        run: pnpm --filter @realm-of-crowns/shared typecheck

      - name: Type check server
        run: npx tsc --noEmit --project server/tsconfig.json

      - name: Type check client
        run: npx tsc --noEmit --project client/tsconfig.json

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: roc_user
          POSTGRES_PASSWORD: roc_password
          POSTGRES_DB: realm_of_crowns_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U roc_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://roc_user:roc_password@localhost:5432/realm_of_crowns_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@10.30.3 --activate

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate --schema=database/prisma/schema.prisma

      - name: Run migrations
        run: pnpm exec prisma migrate deploy --schema=database/prisma/schema.prisma

      - name: Run tests
        run: pnpm --filter @realm-of-crowns/server test --if-present

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@10.30.3 --activate

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate --schema=database/prisma/schema.prisma

      - name: Build all workspaces
        run: pnpm run build

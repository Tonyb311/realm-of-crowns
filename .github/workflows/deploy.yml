name: Deploy to Azure

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (leave empty for auto-generated timestamp)'
        required: false
        type: string

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "TAG=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "TAG=$(date +%Y%m%d%H%M)" >> $GITHUB_OUTPUT
          fi

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: rocregistry.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        run: |
          docker build -f server/Dockerfile -t rocregistry.azurecr.io/realm-of-crowns:${{ steps.tag.outputs.TAG }} .
          docker push rocregistry.azurecr.io/realm-of-crowns:${{ steps.tag.outputs.TAG }}

      - name: Log in to Azure CLI
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container App
        run: |
          az containerapp update \
            --name realm-of-crowns \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image rocregistry.azurecr.io/realm-of-crowns:${{ steps.tag.outputs.TAG }}

      - name: Health check
        run: |
          echo "Waiting 30s for container to start..."
          sleep 30
          curl -sf https://realmofcrowns.com/health || echo "Health check failed — verify manually"

      - name: Summary
        run: |
          echo "### Deployed 🚀" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** rocregistry.azurecr.io/realm-of-crowns:${{ steps.tag.outputs.TAG }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u)" >> $GITHUB_STEP_SUMMARY
